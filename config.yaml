ollama:
  model: llama3.2:3b
  base_url: http://localhost:11434
  classify_models:
    - "llama3.2:3b"
    - "gemma3:4b"
    - "phi3:mini"
  models:
    - "llama3.2:3b"
    - "qwen2.5:3b"

datasets:
  nyt:
    base_url: "https://raw.githubusercontent.com/fhamborg/NewsMTSC/6b838e00f54423c253806327a0ae24dbffa24c9e/NewsSentiment/experiments/default/datasets/newsmtsc-rw-hf/"
    splits:
      - train.jsonl
      - dev.jsonl
      - test.jsonl
    sample_size: 500
  amazon:
    hf_name: SetFit/amazon_reviews_multi_en
    split: test
    sample_size: 498

output:
  raw_dir: data/raw
  processed_dir: data/processed
  results_dir: results

seed: 42
